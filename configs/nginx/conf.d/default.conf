# WAS 이중화 - 로드밸런싱 (Round Robin)
upstream was_backend {
    server tomcat1:8080 weight=1;
    server tomcat2:8080 weight=1;

    # IP Hash 방식 (세션 고정이 필요할 때 활성화)
    # ip_hash;

    # Least Connections 방식
    # least_conn;
}

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name localhost;

    # Nginx 상태 (Prometheus nginx-exporter용) - HTTP에서도 접근 허용
    location /stub_status {
        stub_status;
        allow 172.16.0.0/12;
        deny all;
    }

    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # 나머지는 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 서버
server {
    listen 443 ssl;
    server_name localhost;

    # SSL 인증서 설정
    ssl_certificate     /etc/nginx/ssl/server-chain.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # SSL 프로토콜 및 암호화 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # SSL 세션 캐싱
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS 헤더
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 요청 본문 크기 제한
    client_max_body_size 10M;

    # 로드밸런싱 대상 WAS 확인용 헤더
    add_header X-Upstream $upstream_addr always;

    # 리버스 프록시 → WAS
    location / {
        proxy_pass http://was_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 타임아웃 설정
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 정적 리소스 캐싱 (WAS 부하 감소)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        proxy_pass http://was_backend;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
