global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus 자체 메트릭
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Node Exporter (서버 리소스: CPU, Memory, Disk)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Nginx 상태 (stub_status 모듈)
  - job_name: "nginx"
    static_configs:
      - targets: ["nginx-exporter:9113"]

  # Spring Boot Actuator (Tomcat 메트릭)
  - job_name: "tomcat1"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["tomcat1:8080"]
        labels:
          instance: "tomcat1"

  - job_name: "tomcat2"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["tomcat2:8080"]
        labels:
          instance: "tomcat2"
