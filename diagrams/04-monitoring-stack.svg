<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', 'Noto Sans KR', Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#141428"/>
    </linearGradient>
    <filter id="sh4">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="a4o" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#f97316"/></marker>
    <marker id="a4p" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#a855f7"/></marker>
    <marker id="a4g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#22c55e"/></marker>
    <marker id="a4b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/></marker>
  </defs>

  <rect width="1200" height="800" fill="url(#bg4)" rx="12"/>

  <text x="600" y="40" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="bold">모니터링 스택 구성도</text>
  <text x="600" y="62" text-anchor="middle" fill="#94a3b8" font-size="12">Scouter APM (트랜잭션 추적) + Prometheus/Grafana (인프라 메트릭) 이중 모니터링 체계</text>

  <!-- Two Pillars Label -->
  <rect x="50" y="85" width="530" height="40" rx="8" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="315" y="110" text-anchor="middle" fill="#fb923c" font-size="14" font-weight="bold">Pillar 1: Scouter APM — 트랜잭션 레벨 모니터링</text>

  <rect x="620" y="85" width="530" height="40" rx="8" fill="#2e1065" stroke="#a855f7" stroke-width="1.5"/>
  <text x="885" y="110" text-anchor="middle" fill="#c084fc" font-size="14" font-weight="bold">Pillar 2: Prometheus + Grafana — 인프라 메트릭</text>

  <!-- === Scouter Side === -->
  <!-- Scouter Client -->
  <rect x="70" y="145" width="220" height="90" rx="10" fill="#431407" stroke="#f97316" stroke-width="1.5" filter="url(#sh4)"/>
  <text x="180" y="172" text-anchor="middle" fill="#fb923c" font-size="14" font-weight="bold">Scouter Client</text>
  <text x="180" y="192" text-anchor="middle" fill="#fdba74" font-size="10">(데스크톱 GUI 앱)</text>
  <text x="180" y="210" text-anchor="middle" fill="#fed7aa" font-size="10">XLog | TPS | Heap | Thread</text>
  <text x="180" y="225" text-anchor="middle" fill="#fcd34d" font-size="9">127.0.0.1:6100 접속</text>

  <!-- Scouter Server -->
  <rect x="340" y="145" width="220" height="90" rx="10" fill="#431407" stroke="#ea580c" stroke-width="1.5" filter="url(#sh4)"/>
  <text x="450" y="172" text-anchor="middle" fill="#fb923c" font-size="14" font-weight="bold">Scouter Server</text>
  <text x="450" y="192" text-anchor="middle" fill="#fdba74" font-size="10">mw-scouter (:6100)</text>
  <text x="450" y="210" text-anchor="middle" fill="#fed7aa" font-size="10">데이터 수집 · 저장 · 알림</text>
  <text x="450" y="225" text-anchor="middle" fill="#fcd34d" font-size="9">파일 기반 저장 (database/)</text>

  <!-- Arrow: Client ↔ Server -->
  <line x1="290" y1="190" x2="340" y2="190" stroke="#f97316" stroke-width="2" marker-end="url(#a4o)"/>
  <line x1="340" y1="200" x2="290" y2="200" stroke="#f97316" stroke-width="2" marker-end="url(#a4o)"/>
  <text x="315" y="182" text-anchor="middle" fill="#fcd34d" font-size="8">TCP</text>

  <!-- Scouter Agents -->
  <rect x="130" y="290" width="200" height="75" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1" filter="url(#sh4)"/>
  <text x="230" y="315" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold">Scouter Agent #1</text>
  <text x="230" y="335" text-anchor="middle" fill="#93c5fd" font-size="10">Tomcat #1 JVM 내부</text>
  <text x="230" y="350" text-anchor="middle" fill="#bfdbfe" font-size="9">Bytecode Instrumentation</text>

  <rect x="370" y="290" width="200" height="75" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1" filter="url(#sh4)"/>
  <text x="470" y="315" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold">Scouter Agent #2</text>
  <text x="470" y="335" text-anchor="middle" fill="#93c5fd" font-size="10">Tomcat #2 JVM 내부</text>
  <text x="470" y="350" text-anchor="middle" fill="#bfdbfe" font-size="9">Bytecode Instrumentation</text>

  <!-- Arrows: Agents → Server -->
  <line x1="300" y1="290" x2="420" y2="235" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#a4o)"/>
  <line x1="440" y1="290" x2="450" y2="235" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#a4o)"/>
  <text x="340" y="260" fill="#fcd34d" font-size="9">UDP/TCP :6100</text>

  <!-- Scouter Data Types -->
  <rect x="70" y="390" width="500" height="110" rx="8" fill="#1a1a2e" stroke="#475569" stroke-width="1"/>
  <text x="320" y="415" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="bold">Scouter가 수집하는 데이터</text>
  <text x="90" y="440" fill="#fde68a" font-size="11">📊 XLog</text><text x="170" y="440" fill="#cbd5e1" font-size="10">개별 HTTP 트랜잭션 (URL, 응답시간, 에러 여부)</text>
  <text x="90" y="460" fill="#fde68a" font-size="11">📈 TPS</text><text x="170" y="460" fill="#cbd5e1" font-size="10">초당 처리 건수 (2초 집계)</text>
  <text x="90" y="480" fill="#fde68a" font-size="11">💾 JVM</text><text x="170" y="480" fill="#cbd5e1" font-size="10">힙 메모리, GC 횟수/시간, 쓰레드 수</text>
  <text x="380" y="440" fill="#fde68a" font-size="11">🔍 SQL</text><text x="430" y="440" fill="#cbd5e1" font-size="10">실행된 쿼리 + 소요시간</text>
  <text x="380" y="460" fill="#fde68a" font-size="11">🚨 Active</text><text x="445" y="460" fill="#cbd5e1" font-size="10">현재 처리 중인 요청 수</text>
  <text x="380" y="480" fill="#fde68a" font-size="11">⚠️ Alert</text><text x="440" y="480" fill="#cbd5e1" font-size="10">임계값 초과 시 알림</text>

  <!-- === Prometheus Side === -->
  <!-- Grafana -->
  <rect x="640" y="145" width="220" height="90" rx="10" fill="#2e1065" stroke="#a855f7" stroke-width="1.5" filter="url(#sh4)"/>
  <text x="750" y="172" text-anchor="middle" fill="#c084fc" font-size="14" font-weight="bold">Grafana</text>
  <text x="750" y="192" text-anchor="middle" fill="#d8b4fe" font-size="10">mw-grafana (:3000)</text>
  <text x="750" y="210" text-anchor="middle" fill="#e9d5ff" font-size="10">Middleware Overview 대시보드</text>
  <text x="750" y="225" text-anchor="middle" fill="#c4b5fd" font-size="9">8개 패널 자동 프로비저닝</text>

  <!-- Prometheus -->
  <rect x="910" y="145" width="220" height="90" rx="10" fill="#2e1065" stroke="#8b5cf6" stroke-width="1.5" filter="url(#sh4)"/>
  <text x="1020" y="172" text-anchor="middle" fill="#c084fc" font-size="14" font-weight="bold">Prometheus</text>
  <text x="1020" y="192" text-anchor="middle" fill="#d8b4fe" font-size="10">mw-prometheus (:9090)</text>
  <text x="1020" y="210" text-anchor="middle" fill="#e9d5ff" font-size="10">시계열 메트릭 DB</text>
  <text x="1020" y="225" text-anchor="middle" fill="#c4b5fd" font-size="9">Pull 방식 | 15초 간격 스크래핑</text>

  <!-- Arrow: Prometheus → Grafana -->
  <line x1="910" y1="190" x2="860" y2="190" stroke="#a855f7" stroke-width="2" marker-end="url(#a4p)"/>
  <text x="885" y="182" text-anchor="middle" fill="#c4b5fd" font-size="8">PromQL</text>

  <!-- Scrape Targets -->
  <rect x="660" y="290" width="150" height="65" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1" filter="url(#sh4)"/>
  <text x="735" y="313" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold">Tomcat #1</text>
  <text x="735" y="330" text-anchor="middle" fill="#93c5fd" font-size="9">/actuator/prometheus</text>
  <text x="735" y="345" text-anchor="middle" fill="#bfdbfe" font-size="9">JVM, HTTP 메트릭</text>

  <rect x="825" y="290" width="150" height="65" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1" filter="url(#sh4)"/>
  <text x="900" y="313" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold">Tomcat #2</text>
  <text x="900" y="330" text-anchor="middle" fill="#93c5fd" font-size="9">/actuator/prometheus</text>
  <text x="900" y="345" text-anchor="middle" fill="#bfdbfe" font-size="9">JVM, HTTP 메트릭</text>

  <rect x="660" y="370" width="150" height="65" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1" filter="url(#sh4)"/>
  <text x="735" y="393" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">Node Exporter</text>
  <text x="735" y="410" text-anchor="middle" fill="#cbd5e1" font-size="9">:9100/metrics</text>
  <text x="735" y="425" text-anchor="middle" fill="#e2e8f0" font-size="9">CPU/메모리/디스크/네트워크</text>

  <rect x="825" y="370" width="150" height="65" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1" filter="url(#sh4)"/>
  <text x="900" y="393" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">Nginx Exporter</text>
  <text x="900" y="410" text-anchor="middle" fill="#cbd5e1" font-size="9">:9113/metrics</text>
  <text x="900" y="425" text-anchor="middle" fill="#e2e8f0" font-size="9">연결수/요청수/상태코드</text>

  <rect x="990" y="290" width="150" height="65" rx="8" fill="#2e1065" stroke="#7c3aed" stroke-width="1" filter="url(#sh4)"/>
  <text x="1065" y="313" text-anchor="middle" fill="#c084fc" font-size="11" font-weight="bold">Prometheus</text>
  <text x="1065" y="330" text-anchor="middle" fill="#d8b4fe" font-size="9">:9090/metrics</text>
  <text x="1065" y="345" text-anchor="middle" fill="#e9d5ff" font-size="9">자체 상태 메트릭</text>

  <!-- Arrows: Prometheus → Targets (Pull) -->
  <line x1="1020" y1="235" x2="735" y2="290" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#a4p)"/>
  <line x1="1020" y1="235" x2="900" y2="290" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#a4p)"/>
  <line x1="1020" y1="235" x2="735" y2="370" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#a4p)"/>
  <line x1="1020" y1="235" x2="900" y2="370" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#a4p)"/>
  <line x1="1050" y1="235" x2="1065" y2="290" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#a4p)"/>
  <text x="980" y="270" fill="#c4b5fd" font-size="9">Pull (15초)</text>

  <!-- Prometheus Data Types -->
  <rect x="640" y="460" width="510" height="110" rx="8" fill="#1a1a2e" stroke="#475569" stroke-width="1"/>
  <text x="895" y="485" text-anchor="middle" fill="#c084fc" font-size="12" font-weight="bold">Prometheus가 수집하는 메트릭</text>
  <text x="660" y="510" fill="#e9d5ff" font-size="11">🖥️ 시스템</text><text x="740" y="510" fill="#cbd5e1" font-size="10">CPU 사용률, 메모리, 디스크 I/O, 네트워크</text>
  <text x="660" y="530" fill="#e9d5ff" font-size="11">🌐 Nginx</text><text x="740" y="530" fill="#cbd5e1" font-size="10">활성 연결, 초당 요청수(RPS), 상태코드별 카운트</text>
  <text x="660" y="550" fill="#e9d5ff" font-size="11">☕ JVM</text><text x="740" y="550" fill="#cbd5e1" font-size="10">힙 메모리(used/max), GC 빈도, 쓰레드 수, HTTP 요청 히스토그램</text>

  <!-- Comparison Table -->
  <rect x="70" y="530" width="1060" height="250" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="600" y="558" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="bold">Scouter vs Prometheus/Grafana 비교</text>

  <!-- Table Headers -->
  <rect x="90" y="570" width="200" height="30" rx="4" fill="#334155"/>
  <text x="190" y="590" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">비교 항목</text>
  <rect x="295" y="570" width="380" height="30" rx="4" fill="#431407"/>
  <text x="485" y="590" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="bold">Scouter APM</text>
  <rect x="680" y="570" width="430" height="30" rx="4" fill="#2e1065"/>
  <text x="895" y="590" text-anchor="middle" fill="#c084fc" font-size="11" font-weight="bold">Prometheus + Grafana</text>

  <!-- Table Rows -->
  <text x="110" y="620" fill="#94a3b8" font-size="11">관찰 대상</text>
  <text x="310" y="620" fill="#fde68a" font-size="11">개별 HTTP 트랜잭션 (요청 하나하나)</text>
  <text x="700" y="620" fill="#e9d5ff" font-size="11">집계 메트릭 (평균, 합계, 백분위)</text>

  <text x="110" y="645" fill="#94a3b8" font-size="11">수집 방식</text>
  <text x="310" y="645" fill="#fde68a" font-size="11">Push (Agent → Server, 실시간)</text>
  <text x="700" y="645" fill="#e9d5ff" font-size="11">Pull (Prometheus가 주기적으로 긁어감)</text>

  <text x="110" y="670" fill="#94a3b8" font-size="11">핵심 뷰</text>
  <text x="310" y="670" fill="#fde68a" font-size="11">XLog (점 하나 = 요청 하나), Active Service EQ</text>
  <text x="700" y="670" fill="#e9d5ff" font-size="11">시계열 그래프, Gauge, Table</text>

  <text x="110" y="695" fill="#94a3b8" font-size="11">장점</text>
  <text x="310" y="695" fill="#fde68a" font-size="11">느린 요청 즉시 식별, SQL 추적, 실시간성</text>
  <text x="700" y="695" fill="#e9d5ff" font-size="11">장기 트렌드 분석, Alert 규칙, 다양한 데이터소스</text>

  <text x="110" y="720" fill="#94a3b8" font-size="11">실무 용도</text>
  <text x="310" y="720" fill="#fde68a" font-size="11">장애 발생 시 원인 분석 (RCA)</text>
  <text x="700" y="720" fill="#e9d5ff" font-size="11">용량 계획, SLO 모니터링, 이상 탐지</text>

  <text x="110" y="748" fill="#94a3b8" font-size="11">결론</text>
  <text x="310" y="748" fill="#22c55e" font-size="11" font-weight="bold">두 도구는 경쟁이 아니라 보완 관계 — 함께 사용해야 완전한 관측성(Observability) 확보</text>

  <text x="600" y="785" text-anchor="middle" fill="#64748b" font-size="10">본 프로젝트는 Scouter(트랜잭션 추적) + Prometheus/Grafana(인프라 메트릭)를 동시에 운영하여 이중 모니터링 체계를 구현한다</text>
</svg>