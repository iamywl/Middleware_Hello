<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Segoe UI', 'Noto Sans KR', Arial, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#14142a"/>
    </linearGradient>
    <filter id="sh5">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="a5r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/></marker>
    <marker id="a5b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/></marker>
    <marker id="a5g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/></marker>
    <marker id="a5y" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#eab308"/></marker>
    <marker id="a5p" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/></marker>
  </defs>

  <rect width="1200" height="900" fill="url(#bg5)" rx="12"/>

  <text x="600" y="40" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="bold">보안 및 인증 흐름도</text>
  <text x="600" y="62" text-anchor="middle" fill="#94a3b8" font-size="12">SSL/TLS 암호화 + OIDC Authorization Code Flow + JWT Token 검증</text>

  <!-- ==================== Part 1: TLS/PKI ==================== -->
  <rect x="40" y="80" width="545" height="380" rx="10" fill="#1a0a0e" stroke="#ef4444" stroke-width="1.5"/>
  <text x="312" y="108" text-anchor="middle" fill="#f87171" font-size="16" font-weight="bold">🔒 SSL/TLS — 암호화 통신</text>

  <!-- Certificate Chain -->
  <rect x="60" y="125" width="220" height="160" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1" filter="url(#sh5)"/>
  <text x="170" y="148" text-anchor="middle" fill="#f87171" font-size="12" font-weight="bold">인증서 체인 (PKI)</text>

  <rect x="80" y="160" width="180" height="35" rx="6" fill="#7f1d1d"/>
  <text x="170" y="183" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="bold">🏛️ Root CA (ca.crt)</text>

  <line x1="170" y1="195" x2="170" y2="210" stroke="#ef4444" stroke-width="1.5"/>
  <text x="200" y="207" fill="#94a3b8" font-size="8">서명</text>

  <rect x="80" y="210" width="180" height="35" rx="6" fill="#450a0a"/>
  <text x="170" y="232" text-anchor="middle" fill="#fecaca" font-size="11" font-weight="bold">📜 server.crt (localhost)</text>

  <line x1="170" y1="245" x2="170" y2="260" stroke="#ef4444" stroke-width="1.5"/>

  <rect x="80" y="260" width="180" height="20" rx="4" fill="#334155"/>
  <text x="170" y="275" text-anchor="middle" fill="#94a3b8" font-size="9">server-chain.crt = server + CA</text>

  <!-- TLS Config -->
  <rect x="300" y="125" width="270" height="160" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1" filter="url(#sh5)"/>
  <text x="435" y="148" text-anchor="middle" fill="#f87171" font-size="12" font-weight="bold">Nginx TLS 설정</text>
  <text x="320" y="172" fill="#fca5a5" font-size="10">ssl_protocols</text><text x="440" y="172" fill="#cbd5e1" font-size="10">TLSv1.2 TLSv1.3</text>
  <text x="320" y="192" fill="#fca5a5" font-size="10">ssl_ciphers</text><text x="440" y="192" fill="#cbd5e1" font-size="10">ECDHE-RSA-AES...</text>
  <text x="320" y="212" fill="#fca5a5" font-size="10">ssl_certificate</text><text x="440" y="212" fill="#cbd5e1" font-size="10">server-chain.crt</text>
  <text x="320" y="232" fill="#fca5a5" font-size="10">ssl_certificate_key</text><text x="460" y="232" fill="#cbd5e1" font-size="10">server.key</text>
  <text x="320" y="252" fill="#fca5a5" font-size="10">ssl_session_cache</text><text x="460" y="252" fill="#cbd5e1" font-size="10">shared:SSL:10m</text>
  <text x="320" y="275" fill="#94a3b8" font-size="9">HSTS: max-age=31536000 (1년)</text>

  <!-- HTTP → HTTPS Redirect -->
  <rect x="60" y="300" width="510" height="55" rx="8" fill="#0c2d48" stroke="#0ea5e9" stroke-width="1"/>
  <text x="315" y="323" text-anchor="middle" fill="#38bdf8" font-size="12" font-weight="bold">HTTP(:80) → HTTPS(:443) 강제 리다이렉트</text>
  <text x="315" y="343" text-anchor="middle" fill="#7dd3fc" font-size="10">return 301 https://$host$request_uri — 모든 HTTP 요청을 HTTPS로 전환</text>

  <!-- SSL Termination -->
  <rect x="60" y="370" width="510" height="75" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <text x="315" y="393" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">SSL Termination (SSL 종단)</text>
  <text x="315" y="413" text-anchor="middle" fill="#86efac" font-size="10">Nginx에서 TLS 복호화 → 내부 네트워크는 HTTP 평문 통신</text>
  <text x="315" y="433" text-anchor="middle" fill="#bbf7d0" font-size="9">장점: WAS 부하 감소, 인증서 관리 단일화 | 내부 네트워크는 Docker bridge로 격리</text>

  <!-- ==================== Part 2: OIDC Flow ==================== -->
  <rect x="615" y="80" width="545" height="380" rx="10" fill="#1a0a2e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="887" y="108" text-anchor="middle" fill="#c084fc" font-size="16" font-weight="bold">🔑 OIDC Authorization Code Flow</text>

  <!-- Actors -->
  <rect x="640" y="130" width="110" height="45" rx="8" fill="#334155" filter="url(#sh5)"/>
  <text x="695" y="158" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="bold">🌐 브라우저</text>

  <rect x="800" y="130" width="130" height="45" rx="8" fill="#172554" stroke="#3b82f6" stroke-width="1" filter="url(#sh5)"/>
  <text x="865" y="158" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold">🖥️ Tomcat (WAS)</text>

  <rect x="980" y="130" width="155" height="45" rx="8" fill="#450a0a" stroke="#ef4444" stroke-width="1" filter="url(#sh5)"/>
  <text x="1057" y="158" text-anchor="middle" fill="#f87171" font-size="11" font-weight="bold">🔐 Keycloak (SSO)</text>

  <!-- Flow Steps -->
  <line x1="695" y1="175" x2="835" y2="195" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#a5b)"/>
  <text x="760" y="190" text-anchor="middle" fill="#93c5fd" font-size="9">① GET /secured/profile</text>

  <line x1="865" y1="200" x2="695" y2="220" stroke="#ef4444" stroke-width="1.5" marker-end="url(#a5r)"/>
  <text x="775" y="215" text-anchor="middle" fill="#fca5a5" font-size="9">② 302 → Keycloak 로그인</text>

  <line x1="695" y1="230" x2="1030" y2="250" stroke="#a855f7" stroke-width="1.5" marker-end="url(#a5p)"/>
  <text x="860" y="245" text-anchor="middle" fill="#d8b4fe" font-size="9">③ 브라우저 → Keycloak 로그인 페이지 (localhost:8080)</text>

  <line x1="1057" y1="260" x2="695" y2="280" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a5g)"/>
  <text x="870" y="275" text-anchor="middle" fill="#86efac" font-size="9">④ 로그인 성공 → 302 + Authorization Code</text>

  <line x1="695" y1="290" x2="835" y2="310" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#a5b)"/>
  <text x="760" y="305" text-anchor="middle" fill="#93c5fd" font-size="9">⑤ Code 전달 → Tomcat</text>

  <line x1="865" y1="320" x2="1030" y2="340" stroke="#eab308" stroke-width="1.5" marker-end="url(#a5y)"/>
  <text x="945" y="335" text-anchor="middle" fill="#fde68a" font-size="9">⑥ Code → Token 교환 (서버 간, keycloak:8080)</text>

  <line x1="1057" y1="350" x2="870" y2="370" stroke="#eab308" stroke-width="1.5" marker-end="url(#a5y)"/>
  <text x="960" y="365" text-anchor="middle" fill="#fde68a" font-size="9">⑦ Access Token + ID Token (JWT)</text>

  <line x1="835" y1="380" x2="695" y2="400" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a5g)"/>
  <text x="760" y="395" text-anchor="middle" fill="#86efac" font-size="9">⑧ 프로필 JSON 응답</text>

  <!-- Split URI note -->
  <rect x="635" y="415" width="505" height="35" rx="6" fill="#422006" stroke="#f59e0b" stroke-width="1"/>
  <text x="887" y="438" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="bold">⚠️ Split URI: 브라우저→localhost:8080 / Tomcat→keycloak:8080 (Docker DNS)</text>

  <!-- ==================== Part 3: JWT Token ==================== -->
  <rect x="40" y="480" width="1120" height="180" rx="10" fill="#1a1a0a" stroke="#eab308" stroke-width="1.5"/>
  <text x="600" y="508" text-anchor="middle" fill="#facc15" font-size="16" font-weight="bold">🎫 JWT 토큰 구조 (JSON Web Token)</text>

  <!-- JWT Parts -->
  <rect x="70" y="525" width="330" height="120" rx="8" fill="#422006" stroke="#b45309" stroke-width="1" filter="url(#sh5)"/>
  <text x="235" y="548" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">Header (헤더)</text>
  <text x="90" y="570" fill="#fde68a" font-size="10">{"alg": "RS256",</text>
  <text x="90" y="588" fill="#fde68a" font-size="10"> "typ": "JWT"}</text>
  <text x="90" y="615" fill="#94a3b8" font-size="9">서명 알고리즘 + 토큰 타입</text>
  <text x="90" y="635" fill="#94a3b8" font-size="9">Base64Url 인코딩</text>

  <text x="410" y="585" text-anchor="middle" fill="#fbbf24" font-size="20" font-weight="bold">.</text>

  <rect x="425" y="525" width="340" height="120" rx="8" fill="#422006" stroke="#b45309" stroke-width="1" filter="url(#sh5)"/>
  <text x="595" y="548" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">Payload (클레임)</text>
  <text x="445" y="570" fill="#fde68a" font-size="10">{"sub": "testuser",</text>
  <text x="445" y="588" fill="#fde68a" font-size="10"> "email": "test@middleware.local",</text>
  <text x="445" y="606" fill="#fde68a" font-size="10"> "realm_access": {"roles": ["user"]},</text>
  <text x="445" y="624" fill="#fde68a" font-size="10"> "exp": 1711929600, "iss": "keycloak"}</text>

  <text x="775" y="585" text-anchor="middle" fill="#fbbf24" font-size="20" font-weight="bold">.</text>

  <rect x="790" y="525" width="350" height="120" rx="8" fill="#422006" stroke="#b45309" stroke-width="1" filter="url(#sh5)"/>
  <text x="965" y="548" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">Signature (서명)</text>
  <text x="810" y="575" fill="#fde68a" font-size="10">RSASHA256(</text>
  <text x="810" y="593" fill="#fde68a" font-size="10">  base64(header) + "." +</text>
  <text x="810" y="611" fill="#fde68a" font-size="10">  base64(payload),</text>
  <text x="810" y="629" fill="#fde68a" font-size="10">  Keycloak 개인키)</text>

  <!-- ==================== Part 4: Security Layers ==================== -->
  <rect x="40" y="680" width="1120" height="200" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="600" y="708" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="bold">보안 레이어 요약 — Defense in Depth (심층 방어)</text>

  <!-- Layer boxes -->
  <rect x="70" y="725" width="190" height="70" rx="8" fill="#7f1d1d" opacity="0.8"/>
  <text x="165" y="748" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="bold">Layer 1: 전송 보안</text>
  <text x="165" y="766" text-anchor="middle" fill="#fecaca" font-size="10">TLS 1.2/1.3 암호화</text>
  <text x="165" y="782" text-anchor="middle" fill="#fecaca" font-size="10">HSTS 강제 HTTPS</text>

  <rect x="280" y="725" width="190" height="70" rx="8" fill="#581c87" opacity="0.8"/>
  <text x="375" y="748" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="bold">Layer 2: 인증</text>
  <text x="375" y="766" text-anchor="middle" fill="#e9d5ff" font-size="10">Keycloak SSO (OIDC)</text>
  <text x="375" y="782" text-anchor="middle" fill="#e9d5ff" font-size="10">JWT 토큰 검증</text>

  <rect x="490" y="725" width="190" height="70" rx="8" fill="#172554" opacity="0.8"/>
  <text x="585" y="748" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="bold">Layer 3: 인가</text>
  <text x="585" y="766" text-anchor="middle" fill="#bfdbfe" font-size="10">Spring Security Filter</text>
  <text x="585" y="782" text-anchor="middle" fill="#bfdbfe" font-size="10">Role 기반 접근 제어</text>

  <rect x="700" y="725" width="190" height="70" rx="8" fill="#052e16" opacity="0.8"/>
  <text x="795" y="748" text-anchor="middle" fill="#86efac" font-size="12" font-weight="bold">Layer 4: 네트워크</text>
  <text x="795" y="766" text-anchor="middle" fill="#bbf7d0" font-size="10">Docker bridge 격리</text>
  <text x="795" y="782" text-anchor="middle" fill="#bbf7d0" font-size="10">WAS 포트 미노출</text>

  <rect x="910" y="725" width="230" height="70" rx="8" fill="#334155" opacity="0.8"/>
  <text x="1025" y="748" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="bold">Layer 5: 애플리케이션</text>
  <text x="1025" y="766" text-anchor="middle" fill="#cbd5e1" font-size="10">OWASP Top 10 방어</text>
  <text x="1025" y="782" text-anchor="middle" fill="#cbd5e1" font-size="10">CSRF/XSS 방어 헤더</text>

  <!-- Arrow showing depth -->
  <line x1="70" y1="810" x2="1140" y2="810" stroke="#475569" stroke-width="2"/>
  <polygon points="1135,805 1145,810 1135,815" fill="#475569"/>
  <text x="600" y="835" text-anchor="middle" fill="#64748b" font-size="11">외부 ────────────────────────────────── 보안 깊이(Depth) ──────────────────────────────────► 내부</text>

  <text x="600" y="865" text-anchor="middle" fill="#64748b" font-size="10">클라이언트 요청은 이 5개 보안 레이어를 모두 통과해야 보호된 리소스(/secured/**)에 접근할 수 있다</text>
</svg>