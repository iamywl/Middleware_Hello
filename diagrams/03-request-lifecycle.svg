<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" font-family="'Segoe UI', 'Noto Sans KR', Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#131a2e"/>
    </linearGradient>
    <filter id="sh3">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arr3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8"/>
    </marker>
    <marker id="arr3r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="1200" height="1000" fill="url(#bg3)" rx="12"/>

  <text x="600" y="40" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="bold">요청 처리 라이프사이클 (Request Lifecycle)</text>
  <text x="600" y="62" text-anchor="middle" fill="#94a3b8" font-size="12">curl -k https://localhost/health → 응답까지의 전체 데이터 흐름</text>

  <!-- Step numbers along the left -->
  <!-- Step 1: DNS + TCP -->
  <circle cx="60" cy="110" r="22" fill="#0ea5e9" filter="url(#sh3)"/>
  <text x="60" y="116" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text>
  <rect x="95" y="88" width="1060" height="55" rx="8" fill="#0c2d48" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="115" y="112" fill="#38bdf8" font-size="14" font-weight="bold">DNS 해석 + TCP 3-Way Handshake</text>
  <text x="115" y="132" fill="#7dd3fc" font-size="11">localhost → 127.0.0.1 | SYN → SYN-ACK → ACK | 클라이언트 ↔ Nginx :443 연결 수립</text>

  <!-- Step 2: TLS -->
  <circle cx="60" cy="175" r="22" fill="#0ea5e9" filter="url(#sh3)"/>
  <text x="60" y="181" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text>
  <rect x="95" y="153" width="1060" height="70" rx="8" fill="#1a0a2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="115" y="177" fill="#a78bfa" font-size="14" font-weight="bold">TLS 핸드셰이크 (SSL/TLS 1.2 또는 1.3)</text>
  <text x="115" y="197" fill="#c4b5fd" font-size="11">Client Hello → Server Hello + Certificate(server-chain.crt) → Key Exchange(ECDHE)</text>
  <text x="115" y="213" fill="#c4b5fd" font-size="11">→ Pre-Master Secret → Master Secret → 대칭키(세션 키) 도출 → 암호화 통신 시작</text>

  <!-- Step 3: HTTP Request -->
  <circle cx="60" cy="258" r="22" fill="#0ea5e9" filter="url(#sh3)"/>
  <text x="60" y="264" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text>
  <rect x="95" y="236" width="1060" height="55" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
  <text x="115" y="260" fill="#4ade80" font-size="14" font-weight="bold">Nginx: HTTP 요청 수신 및 처리</text>
  <text x="115" y="280" fill="#86efac" font-size="11">GET /health HTTP/1.1 | server_name: localhost 매칭 | location / → proxy_pass http://was_backend</text>

  <!-- Step 4: Load Balancing -->
  <circle cx="60" cy="325" r="22" fill="#0ea5e9" filter="url(#sh3)"/>
  <text x="60" y="331" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text>
  <rect x="95" y="303" width="1060" height="70" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
  <text x="115" y="327" fill="#4ade80" font-size="14" font-weight="bold">Nginx: 로드밸런싱 + 헤더 삽입</text>
  <text x="115" y="347" fill="#86efac" font-size="11">upstream was_backend: Round Robin → tomcat1:8080 또는 tomcat2:8080 선택</text>
  <text x="115" y="363" fill="#86efac" font-size="11">헤더 추가: X-Real-IP(클라이언트 IP) + X-Forwarded-For(IP 체인) + X-Forwarded-Proto(https)</text>

  <!-- Step 5: Tomcat Connector -->
  <circle cx="60" cy="407" r="22" fill="#0ea5e9" filter="url(#sh3)"/>
  <text x="60" y="413" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">5</text>
  <rect x="95" y="385" width="1060" height="55" rx="8" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="115" y="409" fill="#60a5fa" font-size="14" font-weight="bold">Tomcat: Connector에서 요청 수신</text>
  <text x="115" y="429" fill="#93c5fd" font-size="11">HTTP/1.1 Connector (port 8080) | 스레드 풀에서 유휴 스레드 할당 (최대 200개, 대기큐 100)</text>

  <!-- Step 6: Spring Security -->
  <circle cx="60" cy="474" r="22" fill="#0ea5e9" filter="url(#sh3)"/>
  <text x="60" y="480" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">6</text>
  <rect x="95" y="452" width="1060" height="55" rx="8" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="115" y="476" fill="#60a5fa" font-size="14" font-weight="bold">Spring Security: FilterChain 통과</text>
  <text x="115" y="496" fill="#93c5fd" font-size="11">/health → 공개 경로 → 인증 없이 통과 | /secured/** → OAuth2 로그인 리다이렉트 (Keycloak)</text>

  <!-- Step 7: Controller -->
  <circle cx="60" cy="541" r="22" fill="#0ea5e9" filter="url(#sh3)"/>
  <text x="60" y="547" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">7</text>
  <rect x="95" y="519" width="1060" height="55" rx="8" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="115" y="543" fill="#60a5fa" font-size="14" font-weight="bold">DispatcherServlet → Controller 매핑 및 실행</text>
  <text x="115" y="563" fill="#93c5fd" font-size="11">GET /health → HealthController.health() → {"status":"UP","host":"컨테이너ID"} JSON 생성</text>

  <!-- Step 8: DB (Optional) -->
  <circle cx="60" cy="608" r="22" fill="#f59e0b" filter="url(#sh3)"/>
  <text x="60" y="614" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">8</text>
  <rect x="95" y="586" width="1060" height="55" rx="8" fill="#422006" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="115" y="610" fill="#fbbf24" font-size="14" font-weight="bold">(필요 시) JPA → MySQL JDBC 쿼리</text>
  <text x="115" y="630" fill="#fde68a" font-size="11">HikariCP 커넥션 풀에서 커넥션 획득 → SQL 실행 → 결과 반환 → 커넥션 반환</text>

  <!-- Step 9: Response back -->
  <circle cx="60" cy="675" r="22" fill="#f97316" filter="url(#sh3)"/>
  <text x="60" y="681" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">9</text>
  <rect x="95" y="653" width="1060" height="55" rx="8" fill="#172554" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="115" y="677" fill="#fb923c" font-size="14" font-weight="bold">← 응답 반환: Tomcat → Nginx</text>
  <text x="115" y="697" fill="#fdba74" font-size="11">JSON 응답 생성 → 스레드 반환 → AccessLogValve 기록 (응답시간 %D ms) → Nginx에 전달</text>

  <!-- Step 10: Nginx Response -->
  <circle cx="60" cy="742" r="22" fill="#f97316" filter="url(#sh3)"/>
  <text x="60" y="748" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">10</text>
  <rect x="95" y="720" width="1060" height="55" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="115" y="744" fill="#fb923c" font-size="14" font-weight="bold">← Nginx: 응답 가공 및 클라이언트 전송</text>
  <text x="115" y="764" fill="#fdba74" font-size="11">X-Upstream 헤더 추가 → Gzip 압축 (application/json) → TLS 암호화 → 클라이언트에 전송 → 접근 로그 기록</text>

  <!-- Step 11: Monitoring (Side effect) -->
  <circle cx="60" cy="815" r="22" fill="#a855f7" filter="url(#sh3)"/>
  <text x="60" y="821" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">⚡</text>
  <rect x="95" y="793" width="1060" height="70" rx="8" fill="#1a0a2e" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="115" y="817" fill="#c084fc" font-size="14" font-weight="bold">모니터링 데이터 수집 (비동기, 요청과 병렬)</text>
  <text x="115" y="837" fill="#d8b4fe" font-size="11">Scouter Agent → XLog 데이터(URL, 응답시간, SQL) → Scouter Server (UDP :6100)</text>
  <text x="115" y="853" fill="#d8b4fe" font-size="11">Prometheus → /actuator/prometheus 스크래핑 (15초 간격) → Grafana 대시보드 갱신</text>

  <!-- Timeline Summary -->
  <rect x="95" y="880" width="1060" height="100" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="625" y="905" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="bold">응답 시간 구성 요소</text>
  <rect x="120" y="920" width="150" height="25" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="195" y="937" text-anchor="middle" fill="#fff" font-size="10">TLS 핸드셰이크 ~5ms</text>
  <rect x="275" y="920" width="100" height="25" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="325" y="937" text-anchor="middle" fill="#fff" font-size="10">Nginx 처리 ~1ms</text>
  <rect x="380" y="920" width="180" height="25" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="470" y="937" text-anchor="middle" fill="#fff" font-size="10">Spring Boot 로직 ~5-50ms</text>
  <rect x="565" y="920" width="120" height="25" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="625" y="937" text-anchor="middle" fill="#fff" font-size="10">DB 쿼리 ~1-10ms</text>
  <rect x="690" y="920" width="100" height="25" rx="4" fill="#f97316" opacity="0.8"/>
  <text x="740" y="937" text-anchor="middle" fill="#fff" font-size="10">응답 전송 ~1ms</text>
  <text x="625" y="968" text-anchor="middle" fill="#64748b" font-size="10">총 응답시간: 일반적으로 10~70ms (로컬 Docker 환경 기준) | Scouter XLog에서 점 하나 = 이 전체 과정</text>
</svg>